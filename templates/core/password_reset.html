{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - PROSTAFF</title>
  <link rel="icon" type="image/png" href="{% static 'images/logo1.png' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-accent"></div>
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your account email and we'll send you a reset link.</p>
      <form method="post">
        {% csrf_token %}
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Send Reset Link</button>
      </form>
      <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:var(--grey-700);">
        <a href="{% url 'core:login' %}">Back to Sign In</a>
      </p>
    </div>
  </div>
</body>
</html>
