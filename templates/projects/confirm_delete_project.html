{% extends 'core/base.html' %}
{% block content %}
<div class="page-header"><h1>Delete Project</h1></div>
<div class="card">
  <p>Are you sure you want to permanently delete <strong>{{ project.name }}</strong>?
  This will also remove its team assignments and submission history. This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'projects:project_detail' project.id %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
