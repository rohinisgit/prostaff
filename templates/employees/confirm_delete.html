{% extends 'core/base.html' %}
{% block content %}
<div class="page-header">
    <h1>Remove Employee</h1>
</div>
<div class="card">
    <p>Are you sure you want to permanently remove <strong>{{ emp_user.get_full_name|default:emp_user.username }}</strong>?
    This cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'employees:employee_detail' emp_user.id %}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
